apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: spring-boot-app
        image: app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
